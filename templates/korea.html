<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대한민국 경제 및 금리 예측 대시보드</title>

    <style>
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; height: 100vh; background: #f4f6f9; }
        .nav-sidebar { width: 80px; background: #212529; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 15px; }
        .nav-sidebar a { color: #adb5bd; text-decoration: none; font-size: 14px; font-weight: bold; padding: 10px; border-radius: 5px; }
        .nav-sidebar a.active { color: white; background: #007bff; }
        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }

        .control-card, .stat-card, .chart-card {
            background: white; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat-card { text-align: center; }
    </style>
</head>

<body>

<div class="nav-sidebar">
    <a href="/">홈</a>
    <a href="/korea" class="active">한국</a>
    <a href="/japan">일본</a>
    <a href="/usa">미국</a>
</div>

<div class="main-content">

    <h2>🇰🇷 한국 부동산 & 금리 시뮬레이션</h2>

    <!-- 슬라이더 -->
    <div class="control-card">
        <label>
            금리: <span id="interest-val">3.50</span>%
        </label>
        <input type="range" id="interest-input" min="-1" max="10" step="0.25" value="3.5" style="width:100%;">
    </div>

    <!-- 결과 -->
    <div class="grid-container">
        <div class="stat-card">
            <h4>최종 예측</h4>
            <div id="res-final">-</div>
        </div>

        <div class="stat-card">
            <h4>변동</h4>
            <div id="res-change">-</div>
        </div>

        <div class="stat-card">
            <h4>변동률</h4>
            <div id="res-percent">-</div>
        </div>

        <div class="stat-card">
            <h4>정확도</h4>
            <div id="res-accuracy">-</div>
        </div>
    </div>

    <!-- 차트 -->
    <div class="chart-card">
        <h3>예측 차트</h3>
        <div id="loading" style="display:none;">로딩중...</div>
        <img id="chart-img" style="width:100%;">
    </div>

</div>

<script>
const slider = document.getElementById("interest-input");
const val = document.getElementById("interest-val");

slider.addEventListener("input", e => {
    val.innerText = parseFloat(e.target.value).toFixed(2);
});

slider.addEventListener("change", async () => {
    document.getElementById("loading").style.display = "block";

    const res = await fetch("/korea/predict", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({interest: slider.value})
    });

    const data = await res.json();

    document.getElementById("loading").style.display = "none";

    if(data.status === "success") {
        document.getElementById("chart-img").src = "data:image/png;base64," + data.image;

        document.getElementById("res-final").innerText = data.final_price;
        document.getElementById("res-change").innerText = data.change;
        document.getElementById("res-percent").innerText = data.change_percent + "%";
        document.getElementById("res-accuracy").innerText = data.accuracy + "%";
    }
});

window.onload = () => slider.dispatchEvent(new Event("change"));
</script>

</body>
</html>
